# =============================================================================
# Telegraf — ems-edge
# Modbus TCP (via SenseLive X5050 gateway) -> JSON -> MQTT
#
# Env vars below are substituted from .env at load time (${VAR}).
# Go-template snippets ({{ .Tag "meter" }}) are evaluated at runtime.
#
# METER: Rishabh LM1360  |  Reads: Voltage(0) Current(6) Power(52) Energy(72)
# DATA TYPE ASSUMPTION: 32-bit IEEE-754 FLOAT across 2 holding registers.
# BYTE ORDER ASSUMPTION: ABCD (big-endian word order).
#   -> If readings look wrong, try CDAB then DCBA then BADC (see README).
# =============================================================================

# -----------------------------------------------------------------------------
# Agent
# -----------------------------------------------------------------------------
[agent]
  interval = "${POLL_INTERVAL}"      # poll every 5s
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "${POLL_INTERVAL}" # publish as fast as we poll
  flush_jitter = "0s"
  precision = "1s"
  omit_hostname = false

# -----------------------------------------------------------------------------
# OUTPUT — MQTT
# Topic template resolves to: ems/<PLANT_ID>/meterNN  (e.g. ems/plant01/meter07)
# -----------------------------------------------------------------------------
[[outputs.mqtt]]
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topic = 'ems/${PLANT_ID}/{{ .Tag "meter" }}'
  qos = 1
  keep_alive = 30
  # client_id kept per-plant so multiple edge nodes never collide on the broker
  client_id = "ems-edge-${PLANT_ID}"
  data_format = "json"
  json_timestamp_units = "1ms"

# -----------------------------------------------------------------------------
# OUTPUT — local file (audit trail / offline debugging). Rotates via logrotate.
# -----------------------------------------------------------------------------
[[outputs.file]]
  files = ["/var/log/telegraf/metrics.out"]
  data_format = "json"
  json_timestamp_units = "1ms"

# =============================================================================
# INPUTS — one Modbus block per meter/slave.
# name_override sets the JSON measurement name; tags carry identity.
# =============================================================================

# ---- Meter 07 (Slave ID 7) --------------------------------------------------
[[inputs.modbus]]
  name_override = "energy"
  controller = "tcp://${GATEWAY_IP}:${GATEWAY_PORT}"
  slave_id = 7
  timeout = "3s"
  busy_retries = 3
  busy_retries_wait = "200ms"

  [inputs.modbus.tags]
    meter = "meter07"
    slave_id = "7"
    plant = "${PLANT_ID}"
    tenant = "${TENANT_ID}"
    gateway = "senselive-x5050"

  holding_registers = [
    { name = "voltage", byte_order = "ABCD", data_type = "FLOAT32", scale = 1.0, address = [0, 1]   },
    { name = "current", byte_order = "ABCD", data_type = "FLOAT32", scale = 1.0, address = [6, 7]   },
    { name = "power",   byte_order = "ABCD", data_type = "FLOAT32", scale = 1.0, address = [52, 53] },
    { name = "energy",  byte_order = "ABCD", data_type = "FLOAT32", scale = 1.0, address = [72, 73] },
  ]

