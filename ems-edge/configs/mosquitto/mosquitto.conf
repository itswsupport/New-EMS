# =============================================================================
# Mosquitto MQTT Broker — ems-edge
# Reference: https://mosquitto.org/man/mosquitto-conf-5.html
# =============================================================================

# -----------------------------------------------------------------------------
# Network listener
# -----------------------------------------------------------------------------
listener 1883 0.0.0.0
protocol mqtt

# -----------------------------------------------------------------------------
# Authentication
# -----------------------------------------------------------------------------
# !!! DEVELOPMENT ONLY !!!
# Anonymous access is enabled so you can bring the stack up with zero setup.
# HARDEN BEFORE PRODUCTION — see "Securing the broker" in README.md:
#   1) allow_anonymous false
#   2) password_file /mosquitto/config/passwd   (mosquitto_passwd -c ... )
#   3) Add TLS listener on 8883 with cafile/certfile/keyfile
#   4) Add an ACL file to scope topics per tenant/plant
allow_anonymous true

# -----------------------------------------------------------------------------
# Persistence — survive broker restarts (retained msgs, queued QoS>0)
# -----------------------------------------------------------------------------
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
connection_messages true

# -----------------------------------------------------------------------------
# Message handling / back-pressure
# -----------------------------------------------------------------------------
max_queued_messages 10000
message_size_limit 0
max_inflight_messages 40
