# =============================================================================
# Notification wiring for the EMS alerts — VISUAL ONLY.
#
# A single contact point with no external integration, and a default policy
# routing everything to it. This satisfies Grafana's unified-alerting
# requirement (rules must route somewhere) while sending NOTHING outward:
# alert state (Normal / Pending / Firing) is visible in Alerting → Alert rules
# and on dashboards, but no email/Slack/webhook is delivered.
#
# To enable real delivery later, add an integration to the contact point below
# (e.g. an `email` or `slack` block) — no rule changes needed.
# =============================================================================
apiVersion: 1

contactPoints:
  - orgId: 1
    name: ems-visual
    receivers:
      - uid: ems-visual-noop
        # A webhook to localhost that no one is listening on = state tracked in
        # Grafana, nothing delivered. Disabled from resolved notifications too.
        type: webhook
        disableResolveMessage: true
        settings:
          url: http://localhost:1/noop

policies:
  - orgId: 1
    receiver: ems-visual
    group_by: ["alertname", "device_id"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
