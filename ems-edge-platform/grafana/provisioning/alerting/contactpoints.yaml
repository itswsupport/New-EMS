# =============================================================================
# Notification wiring for the EMS alerts — VISUAL ONLY.
#
# Alert *state* (Normal / Pending / Firing) is evaluated and shown in
# Alerting → Alert rules and on dashboards. A single contact point routes to a
# no-op webhook (localhost:1) so nothing is actually delivered outward.
#
# NOTE: because delivery targets a dead endpoint, Grafana logs a harmless
# "connection refused" when an alert fires. This is cosmetic (logs rotate at
# 10 MB) — do NOT replace it with a provisioned mute timing unless tested
# against a running Grafana; a malformed mute block makes Grafana exit on boot.
#
# To enable real delivery later, add an integration (email/slack/...) to the
# ems-visual contact point (and Grafana SMTP if email). No rule changes needed.
# =============================================================================
apiVersion: 1

contactPoints:
  - orgId: 1
    name: ems-visual
    receivers:
      - uid: ems-visual-noop
        type: webhook
        disableResolveMessage: true
        settings:
          url: http://localhost:1/noop

policies:
  - orgId: 1
    receiver: ems-visual
    group_by: ["alertname", "device_id"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 12h
