# Loads any dashboard JSON found in /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: EMS
    orgId: 1
    folder: EMS
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
