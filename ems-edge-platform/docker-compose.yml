# =============================================================================
# ems-edge-platform — local/edge deployment
#   postgres  : PostgreSQL 16 + pgvector (persistent volume)
#   migrate   : one-shot; applies Prisma migrations + pgvector SQL, then exits
#   app       : the ingestion platform (TCP listener :4196, HTTP API :8080)
# Secrets are supplied via Docker Secrets (see ./secrets/*), NOT env literals.
# =============================================================================
name: ems-edge-platform

networks:
  ems-net:
    name: ems-net
    driver: bridge

volumes:
  pgdata:
    name: ems-pgdata

secrets:
  db_password:
    file: ./secrets/db_password.txt

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ems-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ems}
      POSTGRES_DB: ${POSTGRES_DB:-ems}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ems-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ems} -d ${POSTGRES_DB:-ems}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g

  # One-shot migration job: builds the app image, runs schema + pgvector setup.
  migrate:
    build:
      context: .
      target: build
    container_name: ems-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ems}:__PW__@postgres:5432/${POSTGRES_DB:-ems}?schema=public
      PG_VECTOR_DIMENSION: ${PG_VECTOR_DIMENSION:-1536}
    secrets:
      - db_password
    entrypoint: ["bash", "scripts/migrate.sh"]
    networks:
      - ems-net
    restart: "no"

  app:
    build:
      context: .
      target: runtime
    container_name: ems-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      # Host is the compose service name; password injected from the secret.
      DATABASE_URL: postgresql://${POSTGRES_USER:-ems}:__PW__@postgres:5432/${POSTGRES_DB:-ems}?schema=public&connection_limit=10
    secrets:
      - db_password
    # Rewrite __PW__ with the mounted secret at container start (no secret in env/image).
    entrypoint: ["/bin/sh", "-c", "export DATABASE_URL=$(echo \"$$DATABASE_URL\" | sed \"s/__PW__/$$(cat /run/secrets/db_password)/\"); exec node --import tsx apps/ingestion-service/src/main.ts"]
    ports:
      - "${GATEWAY_LISTEN_PORT:-4196}:4196"   # gateway TCP listener
      - "${API_PORT:-8080}:8080"              # HTTP API / metrics
    networks:
      - ems-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768m
