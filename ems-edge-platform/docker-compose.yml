# =============================================================================
# ems-edge-platform — deployment stack
#   postgres  : PostgreSQL 16 + pgvector (persistent volume, healthcheck)
#   migrate   : one-shot; prisma migrate deploy + pgvector SQL, then exits
#   app       : ingestion platform (gateway TCP listener :4196, HTTP API :8080)
#
# SECRETS: no credential is ever placed in an environment literal or baked into
# the image. Postgres reads POSTGRES_PASSWORD_FILE; the app reads
# DATABASE_URL_FILE (handled natively by packages/config -> resolveSecretFiles).
# =============================================================================
name: ems-edge-platform

networks:
  ems-net:
    name: ems-net
    driver: bridge

volumes:
  pgdata:
    name: ems-pgdata

secrets:
  db_password:
    file: ./secrets/db_password.txt
  database_url:
    file: ./secrets/database_url.txt

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ems-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ems}
      POSTGRES_DB: ${POSTGRES_DB:-ems}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ems-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ems} -d ${POSTGRES_DB:-ems}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g

  # One-shot schema provisioning. `app` will not start until this exits 0.
  migrate:
    build:
      context: .
      target: build
    container_name: ems-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      PG_VECTOR_DIMENSION: ${PG_VECTOR_DIMENSION:-1536}
    secrets:
      - database_url
    entrypoint: ["bash", "scripts/migrate.sh"]
    networks:
      - ems-net
    restart: "no"

  app:
    build:
      context: .
      target: runtime
    container_name: ems-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      # Overrides the .env value: inside the network the DB is `postgres`, and the
      # URL (with password) comes from a mounted secret, never from the environment.
      DATABASE_URL_FILE: /run/secrets/database_url
    secrets:
      - database_url
    volumes:
      # Live-mount the device/register map so meters & registers can be changed
      # with just an app restart — no image rebuild. The image still bakes a
      # copy as the default; this overlay wins when present.
      - ./config/devices.yaml:/app/config/devices.yaml:ro
    ports:
      # HOST_IP : HOST_PORT : CONTAINER_PORT
      #
      # The container port MUST equal the port the app actually listens on
      # (GATEWAY_LISTEN_PORT / API_PORT), or traffic is mapped to a dead port.
      # The HOST port is a separate knob (*_HOST_PORT) so you can dodge a
      # conflict with another service on the host without reconfiguring the app.
      #
      # Bind IPs live here (not in an overlay) because Compose MERGES `ports`
      # by appending — an overlay re-declaring a port adds a second, colliding
      # binding instead of replacing the first.
      #
      # Gateway listener: must stay reachable on the LAN (the X5050 dials in).
      # Restrict the SOURCE IP at the firewall, not here.
      - "${GATEWAY_BIND_IP:-0.0.0.0}:${GATEWAY_HOST_PORT:-4196}:${GATEWAY_LISTEN_PORT:-4196}"
      # HTTP API / Prometheus: loopback ONLY by default (it exposes /config).
      - "${API_BIND_IP:-127.0.0.1}:${API_HOST_PORT:-8080}:${API_PORT:-8080}"
    networks:
      - ems-net
    healthcheck:
      # Probes the IN-CONTAINER port, so it must track API_PORT (not the host port).
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:${API_PORT:-8080}/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768m
