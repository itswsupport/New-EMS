# =============================================================================
# Grafana overlay (optional) — read-only dashboards over the EMS Postgres.
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#                  -f docker-compose.grafana.yml up -d
#
# Grafana connects to Postgres on the internal ems-net using the same db_password
# secret (read via a provisioning $__file{} macro). The admin login password is
# read from a separate mounted secret — no credential is baked into any image.
# =============================================================================

volumes:
  grafana-data:
    name: ems-grafana-data

secrets:
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt

services:
  grafana:
    image: grafana/grafana:11.2.0
    container_name: ems-grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
    secrets:
      - db_password
      - grafana_admin_password
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      # LAN-reachable by default so dashboards open from a browser. 3300 avoids
      # the many 3000-30xx dashboards already on this host.
      - "${GRAFANA_BIND_IP:-0.0.0.0}:${GRAFANA_HOST_PORT:-3300}:3000"
    networks:
      - ems-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
