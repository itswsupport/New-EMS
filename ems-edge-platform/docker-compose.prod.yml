# =============================================================================
# Production overlay — apply ON TOP of docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# NOTE ON PORTS: this file deliberately declares NO `ports:`. Compose MERGES
# port lists by appending, so re-declaring a port here would create a SECOND
# binding (e.g. 0.0.0.0:8080 *and* 127.0.0.1:8080) — they collide, and the
# insecure 0.0.0.0 binding survives. Bind addresses are controlled by
# GATEWAY_BIND_IP / API_BIND_IP in .env instead, which cannot merge wrongly.
#
# What this overlay changes vs. the dev stack:
#   • restart: always — survives reboots and daemon restarts
#   • production log rotation
#   • Postgres publishes NO ports (reachable only on ems-net)
# =============================================================================

services:
  postgres:
    restart: always
    # Explicitly no `ports:` — never expose the database to the network.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  app:
    restart: always
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
